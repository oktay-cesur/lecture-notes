<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140" role="img" aria-labelledby="title desc">
  <title id="title">2x2 köşegen beyaz görüntü</title>
  <desc id="desc">Sol üst ve sağ alt pikselleri beyaz, sağ üst ve sol alt pikselleri siyah olan 2x2 görüntü.</desc>
  <rect width="140" height="140" fill="#ffffff"/>
  <rect x="1" y="1" width="68" height="68" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <rect x="71" y="1" width="68" height="68" fill="#111111" stroke="#111111" stroke-width="2"/>
  <rect x="1" y="71" width="68" height="68" fill="#111111" stroke="#111111" stroke-width="2"/>
  <rect x="71" y="71" width="68" height="68" fill="#ffffff" stroke="#111111" stroke-width="2"/>
  <text x="35" y="42" text-anchor="middle" font-family="monospace" font-size="16" fill="#111111">255</text>
  <text x="105" y="42" text-anchor="middle" font-family="monospace" font-size="16" fill="#ffffff">0</text>
  <text x="35" y="112" text-anchor="middle" font-family="monospace" font-size="16" fill="#ffffff">0</text>
  <text x="105" y="112" text-anchor="middle" font-family="monospace" font-size="16" fill="#111111">255</text>
</svg>
