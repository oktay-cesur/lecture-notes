project:
  type: website
  output-dir: _site
  resources:
    - .assets/**
  render:
    - "**/*.md"
    - "**/*.qmd"
    - "!**/*-qmd-fallback.qmd"
    - "!topics/search/search-algorithms.md"
    - "!topics/search/search-algorithms-qmd-fallback.qmd"
    - "!.assets/**"
    - "!README.md"

profile:
  group:
    - [default, local]

website:
  title: "Ders Notları"
  navbar:
    left:
      - text: "Ana Sayfa"
        href: index.md
      - text: "BIM444"
        href: courses/bim444/crs-bim444.md
      - text: "QBronze"
        href: courses/qtea26/crs-qbronze.md
    right:
      - icon: github
        href: https://github.com/oktay-cesur/lecture-notes
  sidebar:
    - id: bim444
      title: "BIM444 Yapay Zeka"
      style: docked
      contents:
        - courses/bim444/crs-bim444.md
        - section: "Temeller"
          contents:
            - topics/temel-ai/tp_yapay-zekanin-temelleri.md
            - topics/temel-ai/tp_akilli-etmenler.md
        - section: "Arama"
          contents:
            - topics/search/tp_arama-probleminin-anatomisi.md
            - topics/search/tp_bilgisiz-arama.md
            - topics/search/tp_arama-baglamlandirma.md
            - topics/search/tp_sezgisel-arama.md
            - topics/search/tp_astar-ve-otesi.md
            - topics/search/tp_yerel-arama.md
            - topics/search/tp_minimax.md
            - topics/search/tp_alpha-beta.md
            - topics/search/tp_arama-algoritmalari-animasyon.md
        - section: "Makine Öğrenmesi"
          contents:
            - topics/temel-ai/tp_denetimli-ogrenme.md
            - topics/temel-ai/tp_denetimsiz-ogrenme.md
            - topics/temel-ai/tp_pekistirmeli-ogrenme.md
        - section: "Derin Öğrenme"
          contents:
            - topics/temel-ai/tp_derin-ogrenmeye-giris.md
            - topics/temel-ai/tp_llms.md
        - section: "Diğer Yaklaşımlar"
          contents:
            - topics/temel-ai/tp_bulanik-mantik.md
            - topics/temel-ai/tp_genetik-algoritmalar.md
    - id: qbronze
      title: "QBronze"
      style: docked
      contents:
        - courses/qtea26/crs-qbronze.md
        - section: "Kuantum Temelleri"
          contents:
            - topics/quantum/fotonlar-kuantum-yazi-tura.md
            - topics/quantum/ilk-kuantum-programlar.md
            - topics/quantum/hadamard.md
        - section: "Dolanıklık ve Protokoller"
          contents:
            - topics/quantum/dolaniklik-superdense-coding.md

bibliography: references.bib

format:
  html:
    from: markdown+wikilinks_title_after_pipe
    theme: cosmo
    toc: true
    toc-depth: 3
    lang: tr
    code-fold: true
    code-tools: true
    filters:
      - .filters/obsidian-wikilink.lua
      - .filters/notes-to-text.lua
      - .filters/slide-link.lua
      - .filters/animation-assets.lua
