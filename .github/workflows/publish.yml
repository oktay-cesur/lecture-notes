name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render HTML site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Render slides
        run: |
          mkdir -p _site/slides
          while IFS= read -r f; do
            case "$f" in
              *-qmd-fallback.qmd|topics/search/search-algorithms.md|topics/search/search-algorithms-qmd-fallback.qmd|*/index.md|*/index.qmd)
                continue
                ;;
            esac

            if awk '
              NR==1 {
                if ($0 !~ /^---[[:space:]]*$/) exit 1
                in_yaml=1
                next
              }
              in_yaml && $0 ~ /^---[[:space:]]*$/ {
                closed=1
                exit found ? 0 : 1
              }
              in_yaml && $0 ~ /^[[:space:]]*type:[[:space:]]*["\047]?presentation["\047]?[[:space:]]*$/ { found=1 }
              END {
                if (NR == 0) exit 1
                if (!closed) exit 1
              }
            ' "$f"; then
              quarto render "$f" --profile local,slides --to revealjs --output-dir _site/slides
            fi
          done < <(find . -type f \( -name '*.md' -o -name '*.qmd' \) | sort | sed 's|^\./||')

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
