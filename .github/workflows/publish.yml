name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render HTML site
        uses: quarto-dev/quarto-actions/render@v2

      - name: Render slides
        run: |
          mkdir -p _site/slides
          for f in $(grep -rl '^type: presentation' topics/ courses/ 2>/dev/null); do
            stem="${f%.md}"
            stem="${stem%.qmd}"
            outdir="_site/slides/$(dirname "$stem")"
            mkdir -p "$outdir"
            quarto render "$f" --profile slides --to revealjs --output-dir "$(realpath "$outdir")"
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
